<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- 1. ปรับ Responsive ให้กว้างเต็มจอ (ลบ max-width 500px) --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; }

body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); }

.app-container { 
  width: 100%; 
  min-height: 100vh; 
  background: var(--bg-main); 
  position: relative; 
  padding-bottom: 110px; 
}

.hero { background: linear-gradient(135deg, rgba(176,38,255,0.6) 0%, rgba(0,210,255,0.4) 100%); padding: 30px 20px 55px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 1; }
.logo { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; box-shadow: 0 6px 20px var(--glow); border: 4px solid var(--white); margin: 0 auto 15px; background: #fff; display: flex; align-items: center; justify-content: center; }
.logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; cursor: pointer; user-select: none; }

.tab-container { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); display: flex; background: var(--bg-card); border-radius: 30px; padding: 5px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.08); min-width: 280px; max-width: 95%; overflow-x: auto; scrollbar-width: none; border: 1px solid #f0f0f0; }
.tab-btn { padding: 10px 20px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

.content { padding: 40px 20px 0; max-width: 1200px; margin: 0 auto; }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }

.info-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 14px; flex-wrap: wrap; }

.bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translateY(100%); transition: 0.3s; z-index: 1000; }
.bottom-bar.active { transform: translateY(0); }

.fab-btn { position: fixed; right: 20px; bottom: 90px; width: 55px; height: 55px; background: #10b981; color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 1001; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
.modal-content { background: white; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
.admin-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
.admin-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="app-container">
  <div class="hero">
    <div class="logo"><img id="shopLogoImg" src=""></div>
    <div class="hero-title" onclick="handleAdminTap()">Wanderer Shop</div>
    <div class="hero-sub">รับสินค้าอะไรดีคะ</div>
    <div class="tab-container" id="tabBar"></div>
  </div>

  <div class="content">
    <div id="tab-info" class="tab-content">
      <div class="info-card">
        <div class="info-row"><b>Line</b><span id="info-line">-</span></div>
        <div class="info-row"><b>Facebook</b><span id="info-fb">-</span></div>
        <div id="customInfoArea"></div>
      </div>
    </div>

    <div id="tab-products" class="tab-content active">
        <div id="categoriesView"><div class="category-grid" id="categoryGrid"></div></div>
        <div id="productsView" style="display:none;">
            <button onclick="showCategories()" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-bottom:15px; font-weight:bold;">← กลับ</button>
            <h2 id="currentCategoryTitle"></h2>
            <div id="productGrid" style="margin-top:15px;"></div>
        </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div>เลือก <span id="cartCount">0</span> รายการ | <b>฿<span id="cartTotal">0</span></b></div>
    <button onclick="openCartSummary()" class="admin-btn" style="width:auto; padding:10px 20px; border-radius:20px;">สั่งซื้อ</button>
  </div>

  <div id="adminFab" class="fab-btn" onclick="openAdminModal()">+</div>
</div>

<div id="adminModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="margin-bottom:15px;">⚙️ ตั้งค่าร้านค้า</h3>
    <label>URL โลโก้:</label><input id="editLogo" class="admin-input">
    <label>Line:</label><input id="editLine" class="admin-input">
    <label>Facebook:</label><input id="editFb" class="admin-input">
    
    <div style="margin: 15px 0; padding: 10px; border: 1px dashed #ccc; border-radius: 10px;">
        <p style="font-size: 14px; font-weight: bold;">กล่องข้อความหน้าข้อมูลร้าน</p>
        <div id="editCustomFields"></div>
        <button onclick="addCustomFieldForm()" class="admin-btn" style="background:#6b7280; font-size:12px; margin-top:5px;">+ เพิ่มหัวข้อใหม่</button>
    </div>

    <button onclick="saveShop()" class="admin-btn" style="background:#10b981;">บันทึกข้อมูล</button>
    <button onclick="document.getElementById('adminModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">ปิด</button>
  </div>
</div>

<div id="cartModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="text-align:center; margin-bottom:15px;">🛒 สรุปรายการ</h3>
    <div id="cartList" style="margin-bottom:15px; border-top:1px dashed #eee; padding-top:10px;"></div>
    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">
      <span>ยอดรวม:</span><span>฿<span id="cartSum">0</span></span>
    </div><br>
    <button onclick="confirmCheckout()" class="admin-btn" style="background:#10b981;">คัดลอกรายการ & ทักไลน์</button>
    <button onclick="document.getElementById('cartModal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:#999; cursor:pointer;">แก้ไข</button>
  </div>
</div>

<script>
// ข้อมูลจำลอง (ในระบบจริงจะโหลดจาก JSONBin)
let shop = JSON.parse(localStorage.getItem('w_shop')) || { logo: '', line: '@997pfoig', fb: 'Wanderer Shop', fields: [] };
let products = JSON.parse(localStorage.getItem('w_products')) || [];
let cart = [];
let currentTab = "สินค้า";
let clickCount = 0;

// 4. ระบบแยกบิลตามแท็บ "เติมเกม"
function confirmCheckout() {
  if (cart.length === 0) return;
  let text = `🛒 *รายการสั่งซื้อ Wanderer Shop*\n\n`;
  let isGameTopup = false;

  cart.forEach((item, index) => {
    text += `${index + 1}. ${item.cat} - ${item.name} [฿${item.price}]\n`;
    if (item.tab === "เติมเกม") isGameTopup = true;
  });

  if (isGameTopup) text += `\n📌 *แจ้งไอดีได้เลยค่ะ*\n`;

  let total = cart.reduce((s, i) => s + i.price, 0);
  text += `\nยอดรวม: *฿${total}*\n\nคัดลอกแล้วทักไลน์ได้เลยครับ`;

  navigator.clipboard.writeText(text).then(() => {
    alert("คัดลอกรายการแล้ว! ระบบจะพาไปที่ Line");
    window.open(`https://line.me/ti/p/~${shop.line.replace('@','')}`, '_blank');
  });
}

// 1. ระบบรหัสผ่านใหม่ 170647
function handleAdminTap() {
  clickCount++;
  setTimeout(() => { clickCount = 0; }, 2000);
  if(clickCount >= 5) {
    if(prompt("รหัสผ่านแอดมิน:") === "170647") {
      document.getElementById('adminFab').style.display = 'flex';
      alert("เปิดโหมดแก้ไขแล้ว");
    }
    clickCount = 0;
  }
}

function addCustomFieldForm(t='', d='') {
  const div = document.createElement('div');
  div.className = 'custom-field-box';
  div.style = "margin-bottom:10px; background:#f9f9f9; padding:5px; border-radius:5px;";
  div.innerHTML = `<input class="f-title admin-input" value="${t}" placeholder="หัวข้อ"><textarea class="f-desc admin-input" placeholder="รายละเอียด">${d}</textarea><button onclick="this.parentElement.remove()" style="color:red; border:none; background:none; cursor:pointer; font-size:10px;">[ลบ]</button>`;
  document.getElementById('editCustomFields').appendChild(div);
}

function saveShop() {
  shop.logo = document.getElementById('editLogo').value;
  shop.line = document.getElementById('editLine').value;
  shop.fb = document.getElementById('editFb').value;
  shop.fields = [];
  document.querySelectorAll('.custom-field-box').forEach(box => {
    shop.fields.push({ title: box.querySelector('.f-title').value, desc: box.querySelector('.f-desc').value });
  });
  localStorage.setItem('w_shop', JSON.stringify(shop));
  renderApp();
  document.getElementById('adminModal').style.display='none';
}

function renderApp() {
  document.getElementById('shopLogoImg').src = shop.logo || 'https://via.placeholder.com/130';
  document.getElementById('info-line').innerText = shop.line;
  document.getElementById('info-fb').innerText = shop.fb;
  document.getElementById('customInfoArea').innerHTML = shop.fields.map(f => `<div class="info-row"><b>${f.title}</b><span style="white-space:pre-line; text-align:right;">${f.desc}</span></div>`).join('');
  
  const tb = document.getElementById('tabBar');
  tb.innerHTML = `<button class="tab-btn ${currentTab==='info'?'active':''}" onclick="setTab('info')">ข้อมูลร้าน</button>
                  <button class="tab-btn ${currentTab==='สินค้า'?'active':''}" onclick="setTab('สินค้า')">สินค้า</button>
                  <button class="tab-btn ${currentTab==='เติมเกม'?'active':''}" onclick="setTab('เติมเกม')">เติมเกม</button>`;
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if(t==='info') document.getElementById('tab-info').classList.add('active');
  else { document.getElementById('tab-products').classList.add('active'); showCategories(); }
  renderApp();
}

function openAdminModal() { 
  document.getElementById('adminModal').style.display='flex';
  document.getElementById('editLogo').value = shop.logo;
  document.getElementById('editLine').value = shop.line;
  document.getElementById('editFb').value = shop.fb;
  document.getElementById('editCustomFields').innerHTML = '';
  shop.fields.forEach(f => addCustomFieldForm(f.title, f.desc));
}

function openCartSummary() {
  document.getElementById('cartModal').style.display='flex';
  document.getElementById('cartList').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${i.cat} - ${i.name}</span><b>฿${i.price}</b></div>`).join('');
  document.getElementById('cartSum').innerText = cart.reduce((s,i)=>s+i.price,0);
}

function showCategories() { document.getElementById('categoriesView').style.display='block'; document.getElementById('productsView').style.display='none'; }

window.onload = renderApp;
</script>
</body>
</html>
