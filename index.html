<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderer Shop 🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A29BFE; /* ม่วงพาสเทล */
            --secondary: #81ECEC; /* ฟ้าพาสเทล */
            --bg: #FFFFFF;
            --card-bg: #F9F9FF;
            --text: #2D3436;
            --shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            position: relative;
        }
        .logo-img {
            width: 90px; height: 90px;
            background: white; border-radius: 50%;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 4px solid rgba(255,255,255,0.5);
            object-fit: cover;
        }
        header h1 { font-size: 28px; font-weight: 600; }
        
        /* ADMIN BUTTON */
        .admin-trigger {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.2); border: none;
            padding: 5px 10px; border-radius: 10px; color: white; cursor: pointer; font-size: 12px;
        }

        /* TABS */
        .tabs {
            display: flex; justify-content: center; gap: 10px; margin: -20px 0 20px;
        }
        .tab-btn {
            background: white; border: none; padding: 10px 25px;
            border-radius: 20px; box-shadow: var(--shadow);
            cursor: pointer; font-weight: 500; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .container { max-width: 500px; margin: 0 auto; padding: 0 20px; }

        /* PRODUCT GRID */
        .app-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }
        .app-item {
            text-align: center; cursor: pointer;
        }
        .app-icon {
            width: 70px; height: 70px; background: var(--card-bg);
            border-radius: 20px; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border: 1px solid #eee; transition: 0.3s;
            overflow: hidden;
        }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        .app-item:hover .app-icon { transform: translateY(-5px); border-color: var(--primary); }
        .app-name { font-size: 13px; font-weight: 500; }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: flex-end; z-index: 1000;
        }
        .modal-content {
            background: white; width: 100%; border-top-left-radius: 30px;
            border-top-right-radius: 30px; padding: 30px 20px;
            max-height: 85vh; overflow-y: auto;
        }

        .price-card {
            border: 2px solid #F0F0F0; border-radius: 15px;
            padding: 15px; margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center; cursor: pointer;
        }
        .price-card:hover { border-color: var(--primary); background: #FAF9FF; }
        .price-card.selected { border-color: var(--primary); background: #F2F0FF; }

        /* ADMIN PANEL */
        #adminPanel { display: none; background: #f4f4f4; padding: 20px; border-radius: 20px; margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; margin-top: 5px; }
        .btn-save { background: #00b894; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; }

        /* FOOTER BAR */
        .footer-bar {
            position: fixed; bottom: 0; width: 100%; background: white;
            padding: 20px; border-top: 1px solid #eee; display: none;
            justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        .btn-order { background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 15px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <button class="admin-trigger" onclick="accessAdmin()">จัดการร้านค้า</button>
    <div class="logo-area">
        <img id="storeLogo" src="https://via.placeholder.com/100" class="logo-img" alt="Logo">
    </div>
    <h1 id="storeName">Wanderer_shop</h1>
    <p id="storeSub">[ยินดีต้อนรับร้านละมุดรับสินค้าอะไรดีคะ]</p>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchPage('shop')">เลือกซื้อสินค้า</button>
    <button class="tab-btn" onclick="switchPage('info')">ข้อมูลร้าน</button>
</div>

<div class="container">
    <div id="shopPage">
        <div class="app-grid" id="appGrid">
            </div>
    </div>

    <div id="infoPage" style="display:none;">
        <div style="background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center;">
            <p>ติดต่อสอบถามเพิ่มเติม</p>
            <h3 id="contactLine">Line: @997pfoig</h3>
            <p id="storeTime">เวลาทำการ: 11:00 - 00:00 น.</p>
        </div>
    </div>

    <div id="adminPanel">
        <h3>จัดการหลังบ้าน</h3>
        <hr><br>
        <div class="form-group">
            <label>ชื่อร้าน</label>
            <input type="text" id="editStoreName">
        </div>
        <div class="form-group">
            <label>URL โลโก้</label>
            <input type="text" id="editStoreLogo" placeholder="ใส่ลิงก์รูปภาพ">
        </div>
        <hr><br>
        <h4>+ เพิ่มแอปใหม่</h4>
        <input type="text" id="newAppName" placeholder="ชื่อแอป (เช่น YouTube)">
        <input type="text" id="newAppIcon" placeholder="อีโมจิ หรือ URL รูป">
        <textarea id="newAppDetails" placeholder="รายละเอียด (ราคา|วัน|คำอธิบาย) เช่น: 20|30 วัน|เมลร้าน"></textarea>
        <small>วิธีใส่: ราคา|ระยะเวลา|คำอธิบาย (บรรทัดละ 1 รายการ)</small>
        <button class="btn-save" onclick="addNewApp()" style="margin-top:10px;">เพิ่มเข้าหน้าร้าน</button>
        <button onclick="exitAdmin()" style="margin-top:10px; background:#ff7675; color:white; border:none; width:100%; padding:10px; border-radius:10px;">ออกจากระบบหลังบ้าน</button>
    </div>
</div>

<div class="modal" id="appModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalAppName">App Name</h2>
        <p style="color: #666; margin-bottom: 20px;">เลือกแพ็กเกจที่ต้องการ</p>
        <div id="packageList">
            </div>
        <button class="btn-save" style="margin-top:20px; background: var(--primary);" onclick="confirmOrder()">เพิ่มลงตะกร้า</button>
    </div>
</div>

<div class="footer-bar" id="footerBar">
    <div>
        <small>ยอดรวม</small>
        <h3 id="totalDisplay">฿0</h3>
    </div>
    <button class="btn-order" onclick="sendToLine()">สั่งซื้อผ่าน LINE</button>
</div>

<script>
    // ข้อมูลเริ่มต้น
    let storeData = JSON.parse(localStorage.getItem('wanderer_data')) || {
        name: "Wanderer_shop",
        sub: "ยินดีต้อนรับร้านละมุดรับสินค้าอะไรดีคะ",
        logo: "https://via.placeholder.com/100",
        apps: [
            { id: 1, name: "YouTube", icon: "🎬", details: "20|30 วัน|เมลร้าน\n35|30 วัน|เมลส่วนตัว" },
            { id: 2, name: "Netflix", icon: "🍿", details: "15|1 วัน|จอเคลม\n115|30 วัน|จอไม่เคลม" }
        ]
    };

    let cart = [];

    function init() {
        document.getElementById('storeName').innerText = storeData.name;
        document.getElementById('storeLogo').src = storeData.logo;
        renderApps();
    }

    function renderApps() {
        const grid = document.getElementById('appGrid');
        grid.innerHTML = '';
        storeData.apps.forEach(app => {
            grid.innerHTML += `
                <div class="app-item" onclick="openApp(${app.id})">
                    <div class="app-icon">${app.icon.includes('http') ? `<img src="${app.icon}">` : app.icon}</div>
                    <div class="app-name">${app.name}</div>
                </div>
            `;
        });
    }

    function openApp(id) {
        const app = storeData.apps.find(a => a.id === id);
        document.getElementById('modalAppName').innerText = app.name;
        const list = document.getElementById('packageList');
        list.innerHTML = '';
        
        const lines = app.details.split('\n');
        lines.forEach((line, idx) => {
            const [price, day, note] = line.split('|');
            list.innerHTML += `
                <div class="price-card" onclick="selectPackage('${app.name}', '${price}', '${day}', '${note}', this)">
                    <div>
                        <b>${day}</b><br>
                        <small>${note}</small>
                    </div>
                    <div style="color: var(--primary); font-weight: 600;">฿${price}</div>
                </div>
            `;
        });
        document.getElementById('appModal').style.display = 'flex';
    }

    let tempSelection = null;
    function selectPackage(name, price, day, note, el) {
        document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        tempSelection = { name, price, day, note };
    }

    function confirmOrder() {
        if(!tempSelection) return alert('กรุณาเลือกแพ็กเกจ');
        cart.push(tempSelection);
        updateCart();
        closeModal();
    }

    function updateCart() {
        const total = cart.reduce((sum, item) => sum + parseInt(item.price), 0);
        document.getElementById('totalDisplay').innerText = `฿${total}`;
        document.getElementById('footerBar').style.display = cart.length > 0 ? 'flex' : 'none';
    }

    function sendToLine() {
        let text = "🛒 รายการสั่งซื้อใหม่\n";
        cart.forEach(i => text += `- ${i.name} ${i.day} (${i.note}) ฿${i.price}\n`);
        text += `💰 รวมทั้งสิ้น: ${document.getElementById('totalDisplay').innerText}`;
        window.location.href = `https://line.me/R/oaMessage/@997pfoig/?${encodeURIComponent(text)}`;
    }

    // ฟังก์ชันหลังบ้าน
    function accessAdmin() {
        const pass = prompt("กรุณาใส่รหัสผ่านหลังบ้าน:");
        if(pass === "1234") { // ตั้งรหัสผ่านที่นี่
            document.getElementById('shopPage').style.display = 'none';
            document.getElementById('infoPage').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('editStoreName').value = storeData.name;
            document.getElementById('editStoreLogo').value = storeData.logo;
        } else {
            alert("รหัสผ่านไม่ถูกต้อง");
        }
    }

    function addNewApp() {
        const name = document.getElementById('newAppName').value;
        const icon = document.getElementById('newAppIcon').value;
        const details = document.getElementById('newAppDetails').value;
        
        if(!name || !details) return alert('กรุณากรอกข้อมูลให้ครบ');
        
        storeData.apps.push({ id: Date.now(), name, icon, details });
        saveData();
        alert('เพิ่มสำเร็จ!');
        location.reload();
    }

    function saveData() {
        storeData.name = document.getElementById('editStoreName').value;
        storeData.logo = document.getElementById('editStoreLogo').value;
        localStorage.setItem('wanderer_data', JSON.stringify(storeData));
    }

    function exitAdmin() { location.reload(); }

    function switchPage(p) {
        document.getElementById('shopPage').style.display = p === 'shop' ? 'block' : 'none';
        document.getElementById('infoPage').style.display = p === 'info' ? 'block' : 'none';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(p === 'shop' ? 'เลือกซื้อ' : 'ข้อมูล')));
    }

    function closeModal() { document.getElementById('appModal').style.display = 'none'; tempSelection = null; }

    init();
</script>

</body>
</html>
