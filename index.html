<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderer_shop - Premium Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: #8E94F2;
            --main-dark: #767ce0;
            --bg: #f5f7ff;
            --white: #ffffff;
            --orange: #ff8c00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: var(--bg); color: #333; }

        /* --- Header --- */
        header {
            background: linear-gradient(135deg, #a5c0f3 0%, #d1a1f1 100%);
            padding: 50px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .logo-box {
            width: 100px; height: 100px; background: white;
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- 1. Tab Menu --- */
        .tabs {
            display: flex; justify-content: center; gap: 10px;
            margin: -25px 0 20px; padding: 0 15px;
        }

        .tab-btn {
            background: white; border: none; padding: 10px 15px;
            border-radius: 12px; cursor: pointer; font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s; color: #666; font-size: 13px;
        }

        .tab-btn.active { background: var(--main); color: white; }

        /* --- Product Grid --- */
        .container { max-width: 600px; margin: 0 auto 50px; padding: 0 15px; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .product-card {
            background: white; border-radius: 18px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
            border: 1px solid #eee;
        }

        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .product-card img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; }
        .product-card h3 { font-size: 14px; margin-bottom: 5px; }
        .product-card .price-hint { color: var(--orange); font-size: 12px; font-weight: 600; }

        /* --- 2. Modal Popup --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: flex-end; z-index: 1000;
        }

        .modal-content {
            background: white; width: 100%; max-width: 500px;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 30px 20px; animation: slideUp 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header { text-align: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 20px; color: var(--main-dark); }
        
        .info-tag { font-size: 11px; background: #f0f2ff; color: var(--main); padding: 4px 8px; border-radius: 5px; margin: 3px; display: inline-block; }

        .detail-box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .detail-box h4 { font-size: 14px; margin-bottom: 10px; color: #555; border-left: 3px solid var(--main); padding-left: 10px; }
        .detail-box p { font-size: 13px; color: #666; margin-bottom: 5px; line-height: 1.5; }

        .price-option {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border: 2px solid #eee; border-radius: 12px;
            margin-bottom: 10px; text-decoration: none; color: inherit; transition: 0.3s;
        }

        .price-option:hover { border-color: var(--orange); background: #fffcf5; }
        .price-option .opt-title { font-size: 14px; font-weight: 500; }
        .price-option .opt-sold { font-size: 11px; color: #999; }
        .price-option .opt-price { color: var(--orange); font-weight: 600; }

        .close-btn { 
            display: block; width: 100%; padding: 12px; background: #eee; 
            border: none; border-radius: 12px; margin-top: 10px; cursor: pointer; font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://cdn-icons-png.flaticon.com/512/869/869045.png" style="width: 60%;" alt="Logo">
        </div>
        <h1>Wanderer_shop</h1>

    <div class="tabs">

        <button class="tab-btn" onclick="filterTab('เติมเกม', this)">เติมเกม</button>

    <div class="container">

            </div>
    </div>

        <div class="modal-content">

            <button class="close-btn" onclick="closeModal()">ปิดหน้าต่าง</button>

                    warranty: 'ดูแลตลอดการใช้งาน (รอคิว 5-40 นาที)',
                    rules: 'ห้ามเปลี่ยนโปรไฟล์ผู้อื่น'
                },
                options: [
                    { name: 'Full HD หาร 3 (30 วัน)', price: '85', sold: '300' },
                    { name: 'Ultimate 4K หาร 4 (30 วัน)', price: '135', sold: '250' },

        // ฟังก์ชันสร้างการ์ดสินค้า
        function renderProducts(category = 'all') {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            for (let id in products) {
                const p = products[id];
                if (category === 'all' || p.category === category) {
                    grid.innerHTML += `
                        <div class="product-card" onclick="openModal('${id}')">
                            <img src="${p.img}" alt="${p.title}">
                            <h3>${p.title}</h3>
                            <p class="price-hint">เริ่ม ${p.options[0].price}฿</p>
                        </div>
                    `;
                }
            }
        }

        function filterTab(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat);
        }

        function openModal(id) {
            const data = products[id];
            let tagsHtml = data.tags.map(tag => `<span class="info-tag">${tag}</span>`).join('');
            let optionsHtml = data.options.map(opt => `
                <a href="https://line.me/R/oaMessage/@997pfoig/?สนใจ: ${data.title} - ${opt.name} ราคา ${opt.price} บาท" class="price-option">
                    <div>
                        <div class="opt-title">${opt.name}</div>
                        <div class="opt-sold">ซื้อไปแล้ว ${opt.sold} ชิ้น</div>
                    </div>
                    <div class="opt-price">${opt.price}฿</div>
                </a>
            `).join('');

            document.getElementById('modalData').innerHTML = `
                <div class="modal-header">
                    <h2>${data.title}</h2>
                    <div>${tagsHtml}</div>
                </div>
                <div class="detail-box">
                    <h4>✨ รายละเอียดสินค้า</h4>
                    <p><b>ความคมชัด:</b> ${data.features.quality}</p>
                    <p><b>จำนวนอุปกรณ์:</b> ${data.features.device}</p>
                    <p><b>การเคลม/ประกัน:</b> ${data.features.warranty}</p>
                    <p><b>ข้อห้าม:</b> ${data.features.rules}</p>
                </div>
                <div class="detail-box" style="background:transparent; padding:0;">
                    <h4>💰 เลือกแพ็กเกจที่ต้องการ</h4>
                    ${optionsHtml}
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('modalOverlay')) {
                closeModal();
            }
        }

        // เริ่มต้นโหลดสินค้าทั้งหมด
        renderProducts('all');
    </script>
</body>
</html>
