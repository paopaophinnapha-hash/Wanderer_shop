<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wanderer Shop 🌌</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS Design & Layout --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --text-dark: #1f2937; --white: #ffffff; }
        
        body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); padding-bottom: 100px; }
        
        .hero { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); padding: 40px 20px 60px; text-align: center; position: relative; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; }
        .logo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; margin: 0 auto 15px; overflow: hidden; background: #eee; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .hero-title { font-family: 'Mitr', sans-serif; font-size: 28px; margin-bottom: 5px; cursor: pointer; }
        
        /* Tab Navigation */
        .tab-wrapper { position: absolute; bottom: -25px; left: 0; right: 0; display: flex; justify-content: center; }
        .tab-container { background: white; padding: 5px; border-radius: 35px; display: flex; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; overflow-x: auto; scrollbar-width: none; }
        .tab-container::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 12px 25px; border: none; background: none; border-radius: 30px; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }

        .container { max-width: 600px; margin: 50px auto 20px; padding: 0 20px; }
        .content-section { display: none; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & UI */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .category-item { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .category-item:active { transform: scale(0.95); }
        .cat-img { width: 60px; height: 60px; margin: 0 auto 10px; border-radius: 12px; overflow: hidden; }
        .cat-img img { width: 100%; height: 100%; object-fit: cover; }

        /* Admin Form */
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-family: inherit; font-size: 14px; }
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-top: 5px; }
        .file-label { display: block; padding: 10px; background: #f3f4f6; border: 2px dashed #d1d5db; border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 12px; font-size: 13px; }

        /* Bottom Cart Bar */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); transform: translateY(100%); transition: 0.3s; z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .cart-bar.active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo"><img id="shopLogo" src="https://via.placeholder.com/150" alt="Logo"></div>
    <h1 class="hero-title" onclick="enterAdmin()">Wanderer Shop 🌌</h1>
    <p style="font-size: 13px; opacity: 0.9;">ยินดีต้อนรับร้านละมุด รับสินค้าอะไรดีคะ</p>
    
    <div class="tab-wrapper">
        <div class="tab-container" id="mainTabs">
            </div>
    </div>
</div>

<div class="container">
    <div id="section-info" class="content-section">
        <div class="card">
            <h3 style="margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px;">ข้อมูลร้านค้า</h3>
            <div id="infoDisplay"></div>
        </div>
    </div>

    <div id="section-products" class="content-section active">
        <div id="view-categories">
            <h3 style="margin-bottom: 15px;">หมวดหมู่สินค้า</h3>
            <div class="category-grid" id="catGrid"></div>
        </div>
        <div id="view-items" style="display:none;">
            <button onclick="showCats()" style="background:none; border:none; color:var(--primary); font-weight:600; margin-bottom:15px; cursor:pointer;">← ย้อนกลับ</button>
            <h3 id="currentCatTitle" style="margin-bottom:15px;">สินค้า</h3>
            <div id="itemGrid"></div>
        </div>
    </div>

    <div id="section-admin" class="content-section">
        <div class="card">
            <h3>⚙️ จัดการแท็บเมนู</h3>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="newTabName" class="admin-input" placeholder="ชื่อแท็บ เช่น แอปพรีเมี่ยม" style="margin:0;">
                <button onclick="addNewTab()" class="btn-action" style="width:80px; margin:0;">เพิ่ม</button>
            </div>
            <div id="adminTabList" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <h3>📦 เพิ่ม/แก้ไขสินค้า</h3>
            <form id="productForm" style="margin-top:10px;">
                <select id="pTab" class="admin-input"></select>
                <input type="text" id="pCat" class="admin-input" placeholder="หมวดหมู่ (เช่น Netflix 4K)" required>
                <input type="text" id="pName" class="admin-input" placeholder="ชื่อแพ็กเกจ" required>
                <input type="number" id="pPrice" class="admin-input" placeholder="ราคา (บาท)" required>
                
                <label class="file-label">
                    📸 คลิกเพื่อเลือกรูปภาพสินค้า
                    <input type="file" id="pImgFile" accept="image/*" style="display:none;" onchange="previewFile()">
                </label>
                <input type="text" id="pImgUrl" class="admin-input" placeholder="หรือวาง URL รูปภาพ">
                
                <button type="submit" class="btn-action">บันทึกข้อมูลสินค้า</button>
            </form>
            <hr style="margin:20px 0; opacity:0.2;">
            <div id="adminProductList"></div>
            <button onclick="if(confirm('ล้างข้อมูลทั้งหมด?')) {localStorage.clear(); location.reload();}" class="btn-action" style="background:#ef4444; margin-top:20px;">ล้างระบบทั้งหมด</button>
        </div>
    </div>
</div>

<div class="cart-bar" id="cartBar">
    <div style="font-weight:600;">เลือกแล้ว <span id="count">0</span> รายการ | ฿<span id="total">0</span></div>
    <button onclick="sendOrder()" class="btn-action" style="width:auto; padding:10px 25px; border-radius:25px;">สั่งซื้อ</button>
</div>

<script>
    // --- Data Management ---
    let tabs = JSON.parse(localStorage.getItem('w_tabs')) || ["สินค้า"];
    let products = JSON.parse(localStorage.getItem('w_products')) || [];
    let currentTab = "สินค้า";
    let cart = [];

    // --- Initialization ---
    window.onload = () => {
        renderTabs();
        renderCategories();
        renderAdminStuff();
    };

    function renderTabs() {
        const container = document.getElementById('mainTabs');
        let html = `<button class="tab-btn ${currentTab === 'info' ? 'active' : ''}" onclick="switchTab('info')">ข้อมูลร้าน</button>`;
        tabs.forEach(t => {
            html += `<button class="tab-btn ${currentTab === t ? 'active' : ''}" onclick="switchTab('${t}')">${t}</button>`;
        });
        container.innerHTML = html;
    }

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        
        if(t === 'info') {
            document.getElementById('section-info').classList.add('active');
        } else if(t === 'admin') {
            document.getElementById('section-admin').classList.add('active');
        } else {
            document.getElementById('section-products').classList.add('active');
            showCats();
            renderCategories();
        }
        renderTabs();
    }

    // --- File Handling (Support Files/Images) ---
    function previewFile() {
        const file = document.getElementById('pImgFile').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            document.getElementById('pImgUrl').value = reader.result; // Store as Base64
        };
        if (file) reader.readAsDataURL(file);
    }

    // --- Admin Logic ---
    function enterAdmin() {
        let p = prompt("กรุณาใส่รหัสผ่าน:");
        if(p === "170647") switchTab('admin');
    }

    function addNewTab() {
        let name = document.getElementById('newTabName').value.trim();
        if(name && !tabs.includes(name)) {
            tabs.push(name);
            save();
            renderTabs();
            renderAdminStuff();
            document.getElementById('newTabName').value = "";
        }
    }

    document.getElementById('productForm').onsubmit = (e) => {
        e.preventDefault();
        const newP = {
            id: Date.now(),
            tab: document.getElementById('pTab').value,
            cat: document.getElementById('pCat').value,
            name: document.getElementById('pName').value,
            price: parseInt(document.getElementById('pPrice').value),
            img: document.getElementById('pImgUrl').value || 'https://via.placeholder.com/150'
        };
        products.push(newP);
        save();
        renderAdminStuff();
        alert("บันทึกสินค้าแล้ว!");
        e.target.reset();
    };

    // --- UI Rendering ---
    function renderCategories() {
        const grid = document.getElementById('catGrid');
        const filtered = products.filter(p => p.tab === currentTab);
        const uniqueCats = [...new Set(filtered.map(p => p.cat))];

        grid.innerHTML = uniqueCats.map(cat => {
            const sample = filtered.find(p => p.cat === cat);
            return `
                <div class="category-item" onclick="openCat('${cat}')">
                    <div class="cat-img"><img src="${sample.img}"></div>
                    <div style="font-weight:600; font-size:14px;">${cat}</div>
                </div>
            `;
        }).join('') || '<p style="grid-column:span 2; text-align:center; padding:40px; color:#999;">ยังไม่มีสินค้าในแท็บนี้</p>';
    }

    function openCat(cat) {
        document.getElementById('view-categories').style.display = 'none';
        document.getElementById('view-items').style.display = 'block';
        document.getElementById('currentCatTitle').innerText = cat;
        
        const items = products.filter(p => p.cat === cat && p.tab === currentTab);
        document.getElementById('itemGrid').innerHTML = items.map(p => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;" onclick="toggleCart(${p.id})">
                <div>
                    <div style="font-weight:600;">${p.name}</div>
                    <div style="color:var(--primary); font-weight:700;">฿${p.price}</div>
                </div>
                <input type="checkbox" ${cart.find(c=>c.id===p.id)?'checked':''}>
            </div>
        `).join('');
    }

    function toggleCart(id) {
        const p = products.find(x => x.id === id);
        const idx = cart.findIndex(c => c.id === id);
        if(idx > -1) cart.splice(idx, 1);
        else cart.push(p);
        
        updateCartBar();
        openCat(document.getElementById('currentCatTitle').innerText);
    }

    function updateCartBar() {
        const bar = document.getElementById('cartBar');
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('count').innerText = cart.length;
        document.getElementById('total').innerText = total;
        bar.classList.toggle('active', cart.length > 0);
    }

    function sendOrder() {
        let msg = `🛒 สั่งซื้อสินค้า\n----------\n`;
        cart.forEach(c => msg += `- ${c.name} : ${c.price} บ.\n`);
        msg += `----------\nรวมทั้งหมด: ${cart.reduce((s,i)=>s+i.price,0)} บาท`;
        
        navigator.clipboard.writeText(msg);
        alert("คัดลอกรายการสั่งซื้อแล้ว! กำลังไปที่ LINE");
        window.location.href = "https://lin.ee/Vt7DR6S"; // ใส่ลิงก์ไลน์ร้านคุณตรงนี้
    }

    function renderAdminStuff() {
        document.getElementById('pTab').innerHTML = tabs.map(t => `<option value="${t}">${t}</option>`).join('');
        document.getElementById('adminTabList').innerHTML = tabs.map((t, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <span>${t}</span>
                <button onclick="deleteTab(${i})" style="color:red; border:none; background:none;">ลบ</button>
            </div>
        `).join('');
        document.getElementById('adminProductList').innerHTML = products.map(p => `
            <div style="font-size:12px; padding:5px; border-bottom:1px solid #eee;">
                [${p.tab}] ${p.name} - ฿${p.price} 
                <button onclick="deleteProduct(${p.id})" style="color:red; border:none; background:none; float:right;">ลบ</button>
            </div>
        `).join('');
    }

    function deleteTab(i) {
        if(confirm("ลบแท็บสินค้าจะหายหมดนะ?")) {
            const name = tabs[i];
            products = products.filter(p => p.tab !== name);
            tabs.splice(i, 1);
            save();
            location.reload();
        }
    }

    function deleteProduct(id) {
        products = products.filter(p => p.id !== id);
        save();
        renderAdminStuff();
    }

    function showCats() { 
        document.getElementById('view-categories').style.display = 'block'; 
        document.getElementById('view-items').style.display = 'none'; 
    }
    
    function save() {
        localStorage.setItem('w_tabs', JSON.stringify(tabs));
        localStorage.setItem('w_products', JSON.stringify(products));
    }
</script>
</body>
</html>
