<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- โค้ดส่วน CSS ทั้งหมดคงเดิมตามไฟล์ของคุณ --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; }
.app-container { width: 100%; max-width: 500px; min-height: 100vh; background: var(--bg-main); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 110px; overflow-x: hidden; }
.bg-glow-1 { position: absolute; top: -100px; left: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(176,38,255,0.1) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none; }
.bg-glow-2 { position: absolute; bottom: 20%; right: -150px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(0,210,255,0.08) 0%, rgba(0,0,0,0) 70%); z-index: 0; pointer-events: none; }
.hero { background: linear-gradient(135deg, rgba(176,38,255,0.6) 0%, rgba(0,210,255,0.4) 100%); padding: 30px 20px 55px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 1; }
.logo { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; box-shadow: 0 6px 20px var(--glow); border: 4px solid var(--white); margin: 0 auto 15px; background: #fff; display: flex; align-items: center; justify-content: center; }
.logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; cursor: pointer; user-select: none; }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.9); }
.tab-container { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); display: flex; background: var(--bg-card); border-radius: 30px; padding: 5px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.08); min-width: 280px; max-width: 90%; overflow-x: auto; scrollbar-width: none; border: 1px solid #f0f0f0; }
.tab-btn { padding: 10px 20px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; background: transparent; color: var(--text-muted); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
.content { padding: 40px 20px 0 20px; position: relative; z-index: 1; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.info-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
.category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.category-card { background: white; border-radius: 15px; padding: 20px 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
.item-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 12px; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer;}
.item-card.selected { border-color: var(--primary); background: #faf5ff; }
.bottom-bar { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 500px; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translate(-50%, 100%); transition: 0.3s; z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
.bottom-bar.active { transform: translate(-50%, 0); }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
.modal-content { background: white; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
.admin-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
.close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #999; cursor: pointer; background: none; border: none; }
</style>
</head>
<body>

<div class="app-container">
  <div class="bg-glow-1"></div><div class="bg-glow-2"></div>
  <div class="hero">
    <div class="logo"><img id="shopLogoImg" src=""></div>
    <div class="hero-title" onclick="handleAdminTap()">Wanderer Shop</div>
    <div class="hero-sub">ยินดีต้อนรับร้าน <span id="shopTitleText">Wanderer Shop</span></div>
    <div class="tab-container" id="tabBar"></div>
  </div>

  <div class="content">
    <div id="tab-info" class="tab-content">
      <div class="info-card">
        <div class="info-row"><b>Line</b><span id="info-line">-</span></div>
        <div class="info-row"><b>Facebook</b><span id="info-fb">-</span></div>
        <div id="customInfoRows"></div>
      </div>
    </div>
    <div id="tab-products" class="tab-content active">
      <div id="categoriesView"><div class="category-grid" id="categoryGrid"></div></div>
      <div id="productsView" style="display:none;">
        <button onclick="showCategories()" style="color:var(--primary); background:none; border:none; cursor:pointer;">← กลับ</button>
        <h2 id="currentCategoryTitle" style="margin:10px 0;"></h2>
        <div id="productGrid"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div>เลือก <span id="cartCount">0</span> รายการ | <b>฿<span id="cartTotal">0</span></b></div>
    <button onclick="openCartSummary()" class="admin-btn" style="width:auto; padding:10px 20px; border-radius:20px;">สั่งซื้อ</button>
  </div>
</div>

<div id="cartSummaryModal" class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closeCartSummary()">&times;</button>
    <h3 style="text-align:center; margin-bottom:20px;">🛒 สรุปรายการสั่งซื้อ</h3>
    <div id="cartSummaryList" style="margin-bottom:20px; border-top:1px dashed #ccc; padding-top:10px;"></div>
    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">
      <span>ยอดรวม:</span><span>฿<span id="cartSummaryTotal">0</span></span>
    </div><br>
    <button onclick="confirmCheckout()" class="admin-btn" style="background:#10b981;">คัดลอก & ไปที่ Line</button>
  </div>
</div>

<script>
// ข้อมูลจำลอง (ในหน้าใช้งานจริง ข้อมูลจะดึงจาก localStorage หรือ Cloud)
let shopInfo = JSON.parse(localStorage.getItem('wandererShopInfo')) || { line: '@997pfoig', facebook: 'Wanderer Shop' };
let products = JSON.parse(localStorage.getItem('wandererProducts')) || [];
let tabs = ["สินค้า", "เติมเกม"];
let cart = [];
let currentTab = "สินค้า";

// --- ฟังก์ชันสรุปรายการและคัดลอก (เงื่อนไขที่คุณต้องการ) ---
function confirmCheckout() {
  if (cart.length === 0) return;
  
  let text = `สรุปรายการสั่งซื้อ Wanderer_shop\n\n`;
  let hasGameTab = false;

  cart.forEach((item) => {
    if (item.tab === "เติมเกม") {
      hasGameTab = true;
      text += `สินค้า: ${item.cat} - ${item.name}\n`;
      text += `ราคา: ${item.price} บาท\n\n`;
    } else {
      text += `สินค้า: ${item.cat} - ${item.name}\n`;
      text += `รายละเอียด: ${item.packDesc ? item.packDesc : '-'}\n`;
      text += `ราคา: ${item.price} บาท\n\n`;
    }
  });

  if (hasGameTab) {
    text += `แจ้งไอดีได้เลยค่ะ\n\n`;
  }

  const total = cart.reduce((sum, item) => sum + item.price, 0);
  text += `--------------------\n`;
  text += `ยอดที่ต้องชำระทั้งหมด: ${total} บาท\n\n`;
  text += `ขอบคุณที่ใช้บริการร้านค่ะ\n`;
  text += `กรุณารอแอดมินตอบกลับภายใน 5-15 นาทีก่อนค่อยโอนนะคะ`;

  navigator.clipboard.writeText(text).then(() => {
    alert("✅ คัดลอกรายการแล้ว! ระบบกำลังพาไปที่ Line...");
    window.open(`https://line.me/ti/p/~${shopInfo.line.replace('@','')}`, '_blank');
  }).catch(err => {
    alert("การคัดลอกล้มเหลว กรุณาแคปหน้าจอส่งแอดมิน");
  });
}

// --- ฟังก์ชันจัดการ UI อื่นๆ (อิงตามไฟล์เดิม) ---
function renderTabs() {
  const container = document.getElementById('tabBar');
  let html = `<button class="tab-btn ${currentTab === 'info' ? 'active' : ''}" onclick="switchTab('info')">ข้อมูลร้าน</button>`;
  tabs.forEach(t => {
    html += `<button class="tab-btn ${currentTab === t ? 'active' : ''}" onclick="switchTab('${t}')">${t}</button>`;
  });
  container.innerHTML = html;
}

function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (id === 'info') {
    document.getElementById('tab-info').classList.add('active');
  } else {
    document.getElementById('tab-products').classList.add('active');
    showCategories();
    renderCategories(id);
  }
  renderTabs();
}

function renderCategories(tabName) {
  const grid = document.getElementById('categoryGrid');
  const filtered = products.filter(p => p.tab === tabName);
  const uniqueCats = [...new Set(filtered.map(p => p.cat))];
  grid.innerHTML = uniqueCats.map(cat => `
    <div class="category-card" onclick="openCategory('${cat}')">
      <div class="cat-icon-wrapper">📦</div>
      <b>${cat}</b>
    </div>
  `).join('');
}

function openCategory(catName) {
  document.getElementById('categoriesView').style.display = 'none';
  document.getElementById('productsView').style.display = 'block';
  document.getElementById('currentCategoryTitle').innerText = catName;
  const items = products.filter(p => p.cat === catName && p.tab === currentTab);
  document.getElementById('productGrid').innerHTML = items.map(p => {
    const isSelected = cart.find(c => c.id === p.id) ? 'selected' : '';
    return `<div class="item-card ${isSelected}" onclick="toggleItem('${p.id}')">
      <div><b>${p.name}</b></div>
      <div style="font-size:12px; color:#666;">${p.packDesc || ''}</div>
      <div style="color:var(--primary); font-weight:bold; margin-top:5px;">฿${p.price}</div>
    </div>`;
  }).join('');
}

function toggleItem(id) {
  const idx = cart.findIndex(c => c.id === id);
  if(idx > -1) cart.splice(idx, 1);
  else cart.push(products.find(p => p.id === id));
  updateCartUI();
  openCategory(document.getElementById('currentCategoryTitle').innerText);
}

function updateCartUI() {
  const count = cart.length;
  document.getElementById('cartCount').innerText = count;
  document.getElementById('cartTotal').innerText = cart.reduce((s,i)=>s+i.price,0);
  document.getElementById('bottomBar').classList.toggle('active', count > 0);
}

function openCartSummary() {
  document.getElementById('cartSummaryModal').style.display = 'flex';
  document.getElementById('cartSummaryList').innerHTML = cart.map(i => `
    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
      <span>${i.cat} - ${i.name}</span>
      <b>฿${i.price}</b>
    </div>
  `).join('');
  document.getElementById('cartSummaryTotal').innerText = cart.reduce((s,i)=>s+i.price,0);
}

function closeCartSummary() { document.getElementById('cartSummaryModal').style.display = 'none'; }
function showCategories() { document.getElementById('categoriesView').style.display='block'; document.getElementById('productsView').style.display='none'; }

// รหัสผ่านแอดมิน 170647 ตามที่คุณต้องการ
function handleAdminTap() {
  const pass = prompt("กรุณาใส่รหัสผ่านแอดมิน:");
  if(pass === "170647") alert("เข้าสู่ระบบแอดมินแล้ว (หน้าตั้งค่ากำลังพัฒนา)");
  else if(pass !== null) alert("รหัสผ่านไม่ถูกต้อง");
}

window.onload = () => {
  renderTabs();
  document.getElementById('info-line').innerText = shopInfo.line;
  document.getElementById('info-fb').innerText = shopInfo.facebook;
};
</script>
</body>
</html>
