<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop 🌌</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Mitr:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #a29bfe; /* ม่วงพาสเทล */
  --secondary: #81ecec; /* ฟ้าพาสเทล */
  --bg-main: #ffffff; /* พื้นหลังขาว */
  --bg-card: #f9f9ff; /* การ์ดพาสเทลเทาอ่อน */
  --text-dark: #2d3436;
  --text-muted: #636e72;
  --accent: #6c5ce7;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Kanit', sans-serif;
  background: var(--bg-main); color: var(--text-dark);
  padding-bottom: 110px; overflow-x: hidden;
}

/* --- HEADER & LOGO --- */
.hero {
  background: linear-gradient(135deg, #efedff 0%, #e0fcff 100%);
  padding: 50px 20px 60px;
  text-align: center;
  border-bottom-left-radius: 40px;
  border-bottom-right-radius: 40px;
  position: relative;
  box-shadow: 0 10px 30px rgba(162, 155, 254, 0.15);
}
.logo-container {
  width: 100px; height: 100px;
  background: #fff;
  border-radius: 30px;
  margin: 0 auto 15px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  overflow: hidden; border: 3px solid #fff;
  cursor: pointer; /* สำหรับกดเข้า Admin */
}
.logo-container img { width: 100%; height: 100%; object-fit: cover; }

.hero-title { font-family: 'Mitr', sans-serif; font-size: 28px; color: var(--accent); margin-bottom: 5px; }
.hero-sub { font-size: 14px; color: var(--text-muted); }

/* --- TABS --- */
.tab-container {
  display: flex; background: #fff; border-radius: 20px;
  padding: 5px; width: 250px; margin: -25px auto 30px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
.tab-btn {
  flex: 1; padding: 10px; border-radius: 15px; border: none;
  font-family: inherit; font-size: 14px; font-weight: 500;
  background: transparent; color: var(--text-muted); cursor: pointer;
}
.tab-btn.active { background: var(--primary); color: #fff; }

/* --- GRID & ICONS --- */
.content { max-width: 600px; margin: 0 auto; padding: 0 20px; }
.app-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
}
.app-card {
  text-align: center; cursor: pointer; transition: transform 0.2s;
}
.app-card:active { transform: scale(0.9); }
.app-icon-wrap {
  width: 75px; height: 75px; background: var(--bg-card);
  border-radius: 22px; margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; border: 2px solid #fff;
  box-shadow: 0 5px 15px rgba(0,0,0,0.03);
  overflow: hidden;
}
.app-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.app-name { font-size: 13px; font-weight: 500; color: var(--text-dark); }

/* --- MODAL (Selection) --- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: none; justify-content: center; align-items: flex-end; z-index: 2000;
  backdrop-filter: blur(4px);
}
.modal-box {
  background: #fff; width: 100%; max-width: 500px;
  border-top-left-radius: 30px; border-top-right-radius: 30px;
  padding: 30px 20px; animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-title { font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.pkg-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
.pkg-item {
  padding: 15px; border: 2px solid #f0f0f5; border-radius: 18px;
  display: flex; justify-content: space-between; align-items: center;
  transition: 0.2s; cursor: pointer;
}
.pkg-item:hover { border-color: var(--primary); background: #fafdff; }
.pkg-item.selected { border-color: var(--primary); background: #f6f5ff; }

/* --- ADMIN PANEL --- */
.admin-section { display: none; background: #fff; padding: 20px; border-radius: 20px; margin-top: 20px; border: 2px dashed var(--primary); }
.admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
.btn-add { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; margin-bottom: 20px; }
.admin-item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }

/* --- BOTTOM BAR --- */
.bottom-bar {
  position: fixed; bottom: 20px; left: 20px; right: 20px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
  border-radius: 25px; padding: 15px 20px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  transform: translateY(150%); transition: 0.3s; z-index: 1000;
}
.bottom-bar.active { transform: translateY(0); }
.bb-btn { background: var(--accent); color: #fff; border: none; padding: 12px 25px; border-radius: 18px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="hero">
  <div class="logo-container" id="mainLogo" onclick="adminClick()">
    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=wanderer" alt="Shop Logo" id="logoImg">
  </div>
  <div class="hero-title" id="displayShopName">Wanderer_shop</div>
  <div class="hero-sub" id="displayShopSub">ยินดีต้อนรับร้านละมุดรับสินค้าอะไรดีคะ</div>
</div>

<div class="tab-container">
  <button class="tab-btn active" onclick="switchTab('shop')">สั่งซื้อสินค้า</button>
  <button class="tab-btn" onclick="switchTab('info')">ข้อมูลร้าน</button>
</div>

<div class="content">
  <div id="page-shop">
    <div class="app-grid" id="appGrid">
      </div>
  </div>

  <div id="page-info" style="display:none;">
    <div style="background:var(--bg-card); padding:25px; border-radius:25px; text-align:center;">
      <p style="color:var(--accent); font-weight:600; margin-bottom:10px;">ช่องทางติดต่อ</p>
      <p id="infoLine">Line: @997pfoig</p>
      <p id="infoTime">เวลาทำการ: 11:00 - 00:00 น.</p>
      <div style="margin-top:15px; font-size:12px; color:var(--text-muted);">ดูแลตลอดการใช้งาน เคลม/แก้ไขภายใน 24ชม.</div>
    </div>
  </div>

  <div id="adminPanel" class="admin-section">
    <h3 style="margin-bottom:15px;">ตั้งค่าหลังบ้าน ⚙️</h3>
    <p style="font-size:12px; margin-bottom:5px;">ชื่อร้าน / สโลแกน</p>
    <input type="text" id="editName" class="admin-input" placeholder="ชื่อร้าน">
    <input type="text" id="editSub" class="admin-input" placeholder="สโลแกน">
    <input type="text" id="editLogo" class="admin-input" placeholder="URL รูปโลโก้">
    
    <hr style="margin:20px 0; opacity:0.2;">
    
    <h4 style="margin-bottom:10px;">เพิ่ม/แก้ไขแอป</h4>
    <input type="text" id="newAppName" class="admin-input" placeholder="ชื่อแอป (เช่น Netflix)">
    <input type="text" id="newAppIcon" class="admin-input" placeholder="URL ไอคอน หรือ Emoji">
    <textarea id="newAppPkgs" class="admin-input" placeholder="ราคา|วัน|คำอธิบาย (บรรทัดละ 1 ชุด)" rows="4"></textarea>
    <small style="display:block; margin-bottom:10px; color:red;">ตัวอย่าง: 15|1 วัน|ดูในมือถือเท่านั้น</small>
    <button class="btn-add" onclick="saveNewApp()">บันทึกแอป</button>
    
    <div id="adminItemList"></div>
    <button onclick="exitAdmin()" style="width:100%; background:#eee; border:none; padding:10px; border-radius:10px;">ปิดโหมดแก้ไข</button>
  </div>
</div>

<div class="modal-overlay" id="purchaseModal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="mAppTitle">📦 เลือกแพ็กเกจ</div>
    <div class="pkg-list" id="mPkgList"></div>
    <button class="btn-add" style="margin-top:20px;" onclick="addToCart()">เพิ่มลงตะกร้า</button>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <div id="cartInfo">เลือก 1 รายการ</div>
  <button class="bb-btn" onclick="sendOrder()">สั่งผ่านไลน์ ✨</button>
</div>

<script>
// --- DATA SYSTEM (LocalStorage) ---
let shopData = JSON.parse(localStorage.getItem('wanderer_shop_v2')) || {
  profile: { name: "Wanderer_shop", sub: "ยินดีต้อนรับร้านละมุดรับสินค้าอะไรดีคะ", logo: "https://api.dicebear.com/7.x/bottts/svg?seed=wanderer" },
  apps: [
    { name: "Netflix", icon: "🍿", pkgs: [{p: "15", d: "1 วัน", n: "จอเคลม"}, {p: "140", d: "30 วัน", n: "จอเคลม"}] },
    { name: "YouTube", icon: "🎬", pkgs: [{p: "25", d: "30 วัน", n: "ครอบครัว"}] }
  ]
};

let currentCart = null;
let clickCount = 0;

// --- INITIALIZE ---
function init() {
  document.getElementById('displayShopName').innerText = shopData.profile.name;
  document.getElementById('displayShopSub').innerText = shopData.profile.sub;
  document.getElementById('logoImg').src = shopData.profile.logo;
  renderShop();
}

function renderShop() {
  const grid = document.getElementById('appGrid');
  grid.innerHTML = '';
  shopData.apps.forEach((app, index) => {
    grid.innerHTML += `
      <div class="app-card" onclick="openApp(${index})">
        <div class="app-icon-wrap">
          ${app.icon.startsWith('http') ? `<img src="${app.icon}">` : app.icon}
        </div>
        <div class="app-name">${app.name}</div>
      </div>
    `;
  });
}

// --- NAVIGATION ---
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-shop').style.display = t === 'shop' ? 'block' : 'none';
  document.getElementById('page-info').style.display = t === 'info' ? 'block' : 'none';
}

// --- PURCHASE LOGIC ---
let selectedAppIndex = -1;
let selectedPkgIndex = -1;

function openApp(index) {
  selectedAppIndex = index;
  const app = shopData.apps[index];
  document.getElementById('mAppTitle').innerText = app.name;
  const list = document.getElementById('mPkgList');
  list.innerHTML = '';
  
  app.pkgs.forEach((pkg, pIdx) => {
    list.innerHTML += `
      <div class="pkg-item" id="pkg-${pIdx}" onclick
