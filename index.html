<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wanderer Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Mitr:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* --- Base Styles --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --primary: #b026ff; --secondary: #00d2ff; --bg-main: #f4f5f7; --bg-card: #ffffff; --text-muted: #6b7280; --glow: rgba(176,38,255,0.5); --text-dark: #1f2937; --white: #ffffff; }
body { font-family: 'Kanit', sans-serif; background: var(--bg-main); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; }

.app-container { width: 100%; max-width: 100%; min-height: 100vh; background: var(--bg-main); position: relative; padding-bottom: 110px; overflow-x: hidden; }

/* --- Hero & Navigation --- */
.hero { background: linear-gradient(135deg, rgba(176,38,255,0.6) 0%, rgba(0,210,255,0.4) 100%); padding: 30px 20px 55px; text-align: center; position: relative; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 1; }
.logo { width: 130px; height: 130px; border-radius: 50%; overflow: hidden; box-shadow: 0 6px 20px var(--glow); border: 4px solid var(--white); margin: 0 auto 15px; background: #fff; display: flex; align-items: center; justify-content: center; }
.logo img { width: 100%; height: 100%; object-fit: cover; }
.hero-title { font-family: 'Mitr', sans-serif; font-size: 32px; font-weight: 700; color: #fff; cursor: pointer; }
.tab-container { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); display: flex; background: var(--bg-card); border-radius: 30px; padding: 5px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.08); min-width: 280px; max-width: 90%; overflow-x: auto; scrollbar-width: none; border: 1px solid #f0f0f0; }
.tab-btn { padding: 10px 20px; border-radius: 25px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }

/* --- Content & Grid --- */
.content { padding: 40px 20px 0 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.info-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 14px; }
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
#productGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }

.item-card { background: white; border-radius: 15px; padding: 20px; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; transition: 0.2s; }
.item-card.selected { border-color: var(--primary); background: #faf5ff; }

/* --- Bottom Bar --- */
.bottom-bar { position: fixed; bottom: 0; left: 50%; width: 100%; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); transform: translate(-50%, 100%); transition: 0.3s; z-index: 1000; border-top-left-radius: 20px; border-top-right-radius: 20px; }
.bottom-bar.active { transform: translate(-50%, 0); }

/* --- Admin & Modals --- */
.fab-btn { position: fixed; right: 20px; bottom: 90px; width: 55px; height: 55px; background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); cursor: pointer; z-index: 1001; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
.modal-content { background: white; width: 100%; max-width: 450px; border-radius: 20px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
.admin-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
.admin-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
.custom-field-box { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; background: #fafafa; }
</style>
</head>
<body>

<div class="app-container">
  <div class="hero">
    <div class="logo"><img id="shopLogoImg" src="https://via.placeholder.com/130"></div>
    <div class="hero-title" onclick="handleAdminTap()">Wanderer Shop</div>
    <div id="shopSub" class="hero-sub" style="color:white; margin-top:5px;">รับสินค้าอะไรดีคะ</div>
    <div class="tab-container" id="tabBar"></div>
  </div>

  <div class="content">
    <div id="tab-info" class="tab-content">
      <div class="info-card">
        <div class="info-row"><b>Line</b><span id="info-line">-</span></div>
        <div class="info-row"><b>Facebook</b><span id="info-fb">-</span></div>
        <div id="customInfoRows"></div>
      </div>
    </div>
    <div id="tab-products" class="tab-content active">
      <div id="categoriesView">
        <div class="category-grid" id="categoryGrid"></div>
      </div>
      <div id="productsView" style="display:none;">
        <button onclick="showCategories()" style="color:var(--primary); background:none; border:none; margin-bottom:15px; cursor:pointer;">← กลับ</button>
        <h2 id="currentCategoryTitle">-</h2>
        <div id="productGrid" style="margin-top:15px;"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div>เลือก <span id="cartCount">0</span> รายการ | <b>฿<span id="cartTotal">0</span></b></div>
    <button onclick="openCartSummary()" class="admin-btn" style="width:auto; padding:10px 20px; border-radius:20px;">สั่งซื้อ</button>
  </div>

  <div id="adminFab" class="fab-btn" onclick="openAdminModal()">+</div>
</div>

<div id="passwordModal" class="modal-overlay">
  <div class="modal-content" style="max-width:320px; text-align:center;">
    <h3>แอดมินล็อกอิน</h3><br>
    <input type="password" id="adminPass" class="admin-input" placeholder="รหัสผ่าน">
    <button onclick="verifyAdmin()" class="admin-btn">ตกลง</button>
  </div>
</div>

<div id="cartModal" class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('cartModal')" style="float:right; border:none; background:none; font-size:20px;">&times;</button>
    <h3>🛒 สรุปรายการ</h3><br>
    <div id="cartList" style="margin-bottom:15px; border-top:1px solid #eee; padding-top:10px;"></div>
    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">
      <span>ยอดรวม:</span><span>฿<span id="cartSum">0</span></span>
    </div><br>
    <button onclick="confirmCheckout()" class="admin-btn" style="background:#10b981;">คัดลอกรายการ & ทักไลน์</button>
  </div>
</div>

<div id="adminModal" class="modal-overlay">
  <div class="modal-content">
    <button onclick="closeModal('adminModal')" style="float:right; border:none; background:none;">ปิด</button>
    <h3>⚙️ จัดการร้านค้า</h3><br>
    
    <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:20px;">
      <label>Line:</label><input id="editLine" class="admin-input">
      <label>Facebook:</label><input id="editFb" class="admin-input">
      <div id="editCustomFields"></div>
      <button onclick="addCustomFieldForm()" class="admin-btn" style="background:#6b7280; font-size:12px; margin-bottom:10px;">+ เพิ่มกล่องข้อความใหม่</button>
      <button onclick="saveShop()" class="admin-btn" style="background:#0ea5e9;">บันทึกข้อมูลร้าน</button>
    </div>

    <h4>📦 เพิ่มสินค้า</h4><br>
    <select id="pTab" class="admin-input"></select>
    <input id="pCat" class="admin-input" placeholder="หมวดหมู่ (เช่น Netflix)">
    <input id="pName" class="admin-input" placeholder="ชื่อสินค้า (เช่น 1 เดือน)">
    <input id="pDesc" class="admin-input" placeholder="รายละเอียด (เช่น จอส่วนตัว)">
    <input id="pPrice" type="number" class="admin-input" placeholder="ราคา">
    <button onclick="addProduct()" class="admin-btn">เพิ่มสินค้าลงระบบ</button>
    
    <div id="adminProductList" style="margin-top:20px;"></div>
  </div>
</div>

<script>
/* --- Core Data --- */
let shop = JSON.parse(localStorage.getItem('w_shop')) || { line: '@line', fb: 'Facebook', fields: [] };
let tabs = JSON.parse(localStorage.getItem('w_tabs')) || ["สินค้า", "เติมเกม"];
let products = JSON.parse(localStorage.getItem('w_products')) || [];
let cart = [];
let currentTab = "สินค้า";

/* --- Checkout Logic (เงื่อนไขแยกแท็บที่คุณต้องการ) --- */
function confirmCheckout() {
  if (cart.length === 0) return;
  let text = `สรุปรายการสั่งซื้อ Wanderer_shop\n\n`;
  let hasGame = false;

  cart.forEach(item => {
    if (item.tab === "เติมเกม") {
      hasGame = true;
      text += `สินค้า: ${item.cat} - ${item.name}\n`;
      if(item.desc) text += `รายละเอียด: ${item.desc}\n`; // ถ้ามีข้อมูลค่อยโชว์
      text += `ราคา: ${item.price} บาท\n\n`;
    } else {
      text += `สินค้า: ${item.cat} - ${item.name}\n`;
      text += `รายละเอียด: ${item.desc ? item.desc : '-'}\n`;
      text += `ราคา: ${item.price} บาท\n\n`;
    }
  });

  if (hasGame) text += `แจ้งไอดีได้เลยค่ะ\n\n`;

  let total = cart.reduce((s, i) => s + i.price, 0);
  text += `--------------------\n`;
  text += `ยอดที่ต้องชำระทั้งหมด: ${total} บาท\n\n`;
  text += `ขอบคุณที่ใช้บริการร้านค่ะ\n`;
  text += `กรุณารอแอดมินตอบกลับภายใน 5-15 นาทีก่อนค่อยโอนนะคะ`;

  navigator.clipboard.writeText(text).then(() => {
    alert("คัดลอกแล้ว! กำลังไปที่ Line");
    window.open(`https://line.me/ti/p/~${shop.line.replace('@','')}`, '_blank');
  });
}

/* --- Admin Functions --- */
function handleAdminTap() { document.getElementById('passwordModal').style.display='flex'; }
function verifyAdmin() {
  if(document.getElementById('adminPass').value === '170647') {
    document.getElementById('adminFab').style.display='flex';
    closeModal('passwordModal');
  } else { alert('รหัสผิด'); }
}

function addCustomFieldForm(t='', d='') {
  const div = document.createElement('div');
  div.className = 'custom-field-box';
  div.innerHTML = `<input class="admin-input f-title" value="${t}" placeholder="หัวข้อ"><textarea class="admin-input f-desc" placeholder="รายละเอียด">${d}</textarea><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none;">ลบ</button>`;
  document.getElementById('editCustomFields').appendChild(div);
}

function saveShop() {
  shop.line = document.getElementById('editLine').value;
  shop.fb = document.getElementById('editFb').value;
  shop.fields = [];
  document.querySelectorAll('.custom-field-box').forEach(box => {
    shop.fields.push({ title: box.querySelector('.f-title').value, desc: box.querySelector('.f-desc').value });
  });
  localStorage.setItem('w_shop', JSON.stringify(shop));
  renderApp();
  alert('บันทึกแล้ว');
}

function addProduct() {
  const p = { 
    id: Date.now(), 
    tab: document.getElementById('pTab').value,
    cat: document.getElementById('pCat').value,
    name: document.getElementById('pName').value,
    desc: document.getElementById('pDesc').value,
    price: parseInt(document.getElementById('pPrice').value)
  };
  products.push(p);
  localStorage.setItem('w_products', JSON.stringify(products));
  renderApp();
  alert('เพิ่มแล้ว');
}

/* --- UI Render --- */
function renderApp() {
  // Render Info
  document.getElementById('info-line').innerText = shop.line;
  document.getElementById('info-fb').innerText = shop.fb;
  document.getElementById('customInfoRows').innerHTML = shop.fields.map(f => `
    <div class="info-row" style="flex-direction:column; align-items:flex-start;">
      <b>${f.title}</b><div style="white-space:pre-wrap; margin-top:5px; color:#555;">${f.desc}</div>
    </div>`).join('');

  // Render Tabs
  const tb = document.getElementById('tabBar');
  tb.innerHTML = `<button class="tab-btn ${currentTab==='info'?'active':''}" onclick="setTab('info')">ข้อมูลร้าน</button>`;
  tabs.forEach(t => tb.innerHTML += `<button class="tab-btn ${currentTab===t?'active':''}" onclick="setTab('${t}')">${t}</button>`);
  
  // Render Categories
  const catGrid = document.getElementById('categoryGrid');
  const filtered = products.filter(p => p.tab === currentTab);
  const uniqueCats = [...new Set(filtered.map(p => p.cat))];
  catGrid.innerHTML = uniqueCats.map(c => `<div onclick="openCat('${c}')" style="background:white; padding:20px; border-radius:15px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.05);"><b>${c}</b></div>`).join('');
  
  // Admin List
  document.getElementById('pTab').innerHTML = tabs.map(t => `<option>${t}</option>`).join('');
  document.getElementById('adminProductList').innerHTML = products.map(p => `
    <div style="font-size:12px; border-bottom:1px solid #eee; padding:5px 0;">
      [${p.tab}] ${p.cat} - ${p.name} (฿${p.price}) 
      <button onclick="delProd(${p.id})" style="color:red; background:none; border:none; margin-left:10px;">ลบ</button>
    </div>`).join('');
}

function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if(t==='info') document.getElementById('tab-info').classList.add('active');
  else { document.getElementById('tab-products').classList.add('active'); showCategories(); }
  renderApp();
}

function openCat(c) {
  document.getElementById('categoriesView').style.display='none';
  document.getElementById('productsView').style.display='block';
  document.getElementById('currentCategoryTitle').innerText = c;
  const filtered = products.filter(p => p.cat === c && p.tab === currentTab);
  document.getElementById('productGrid').innerHTML = filtered.map(p => {
    const sel = cart.find(i => i.id === p.id) ? 'selected' : '';
    return `<div class="item-card ${sel}" onclick="toggleCart(${p.id})">
      <b>${p.name}</b><div style="font-size:12px; color:#777;">${p.desc||''}</div>
      <div style="color:var(--primary); font-weight:bold; margin-top:5px;">฿${p.price}</div>
    </div>`;
  }).join('');
}

function toggleCart(id) {
  const idx = cart.findIndex(i => i.id === id);
  if(idx > -1) cart.splice(idx, 1);
  else cart.push(products.find(p => p.id === id));
  updateCartUI();
  openCat(document.getElementById('currentCategoryTitle').innerText);
}

function updateCartUI() {
  const count = cart.length;
  document.getElementById('cartCount').innerText = count;
  document.getElementById('cartTotal').innerText = cart.reduce((s,i)=>s+i.price,0);
  document.getElementById('bottomBar').classList.toggle('active', count > 0);
}

function openCartSummary() {
  document.getElementById('cartModal').style.display='flex';
  document.getElementById('cartList').innerHTML = cart.map(i => `<div>${i.cat} - ${i.name} (฿${i.price})</div>`).join('');
  document.getElementById('cartSum').innerText = cart.reduce((s,i)=>s+i.price,0);
}

function delProd(id) { products = products.filter(p => p.id !== id); localStorage.setItem('w_products', JSON.stringify(products)); renderApp(); }
function showCategories() { document.getElementById('categoriesView').style.display='block'; document.getElementById('productsView').style.display='none'; }
function openAdminModal() { 
  document.getElementById('adminModal').style.display='flex';
  document.getElementById('editLine').value = shop.line;
  document.getElementById('editFb').value = shop.fb;
  document.getElementById('editCustomFields').innerHTML = '';
  shop.fields.forEach(f => addCustomFieldForm(f.title, f.desc));
}
function closeModal(id) { document.getElementById(id).style.display='none'; }

window.onload = renderApp;
</script>
</body>
</html>
