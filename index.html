<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderer_shop - Premium Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: #8E94F2;
            --main-dark: #767ce0;
            --bg: #f5f7ff;
            --white: #ffffff;
            --orange: #ff8c00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background: var(--bg); color: #333; }

        /* --- Header --- */
        header {
            background: linear-gradient(135deg, #a5c0f3 0%, #d1a1f1 100%);
            padding: 50px 20px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .logo-box {
            width: 100px; height: 100px; background: white;
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* --- 1. Tab Menu --- */
        .tabs {
            display: flex; justify-content: center; gap: 10px;
            margin: -25px 0 20px; padding: 0 15px;
        }

        .tab-btn {
            background: white; border: none; padding: 10px 20px;
            border-radius: 12px; cursor: pointer; font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s; color: #666;
        }

        .tab-btn.active { background: var(--main); color: white; }

        /* --- Product Grid --- */
        .container { max-width: 600px; margin: 0 auto 50px; padding: 0 15px; }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .product-card {
            background: white; border-radius: 18px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
            border: 1px solid #eee;
        }

        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .product-card img { width: 60px; height: 60px; margin-bottom: 10px; }
        .product-card h3 { font-size: 14px; margin-bottom: 5px; }
        .product-card .price-hint { color: var(--orange); font-size: 12px; font-weight: 600; }

        /* --- 2. Modal Popup --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; /* ซ่อนไว้เริ่มต้น */
            justify-content: center; align-items: flex-end; z-index: 1000;
        }

        .modal-content {
            background: white; width: 100%; max-width: 500px;
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 30px 20px; animation: slideUp 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header { text-align: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 20px; color: var(--main-dark); }
        
        .info-tag { font-size: 12px; background: #f0f2ff; color: var(--main); padding: 4px 10px; border-radius: 5px; margin: 5px; display: inline-block; }

        .detail-box { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .detail-box h4 { font-size: 14px; margin-bottom: 10px; color: #555; border-left: 3px solid var(--main); padding-left: 10px; }
        .detail-box p { font-size: 13px; color: #666; margin-bottom: 5px; }

        .price-option {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border: 2px solid #eee; border-radius: 12px;
            margin-bottom: 10px; text-decoration: none; color: inherit; transition: 0.3s;
        }

        .price-option:hover { border-color: var(--orange); background: #fffcf5; }
        .price-option .opt-title { font-size: 14px; font-weight: 500; }
        .price-option .opt-sold { font-size: 11px; color: #999; }
        .price-option .opt-price { color: var(--orange); font-weight: 600; }

        .close-btn { 
            display: block; width: 100%; padding: 12px; background: #eee; 
            border: none; border-radius: 12px; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" style="width: 60%;" alt="Logo">
        </div>
        <h1>Wanderer_shop</h1>
        <p>[ยินดีต้อนรับร้านละมุดรับสินค้าอะไรดีคะ]</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active">ทั้งหมด</button>
        <button class="tab-btn">Streaming</button>
        <button class="tab-btn">Premium App</button>
    </div>

    <div class="container">
        <div class="product-grid">
            <div class="product-card" onclick="openModal('yt-premium')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
                <h3>YouTube Premium</h3>
                <p class="price-hint">เริ่ม 15฿</p>
            </div>
            <div class="product-card" onclick="alert('กำลังอัปเดตข้อมูล...')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
                <h3>Netflix 4K</h3>
                <p class="price-hint">เริ่ม 29฿</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div id="modalData">
                </div>
            <button class="close-btn" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        const products = {
            'yt-premium': {
                title: 'YouTube Premium 30 วัน',
                tags: ['เมลร้าน', 'เมลลูกค้า', 'ต่อเมล', 'ไม่ต่อ', 'เคลม', 'ไม่เคลม'],
                features: {
                    quality: 'ดูได้ตลอดไม่มีโฆษณาคั่น / ฟังเพลงตอนปิดจอ',
                    device: 'ดูได้ 1 จอส่วนตัวในกลุ่มครอบครัว',
                    warranty: 'ประกันตลอดอายุการใช้งาน / เคลม-แก้ไขภายใน 24 ชม.',
                    rules: 'ห้ามออกจากกลุ่ม / ห้ามเปลี่ยนประเทศในเมล'
                },
                options: [
                    { name: 'เมลลูกค้า (ไม่เคลม)', price: '15', sold: '1.2k' },
                    { name: 'เมลลูกค้า (เคลม)', price: '20', sold: '850' },
                    { name: 'เมลร้าน (ไม่เคลม)', price: '25', sold: '500' },
                    { name: 'เมลร้าน (เคลม)', price: '30', sold: '300' }
                ]
            }
        };

        function openModal(id) {
            const data = products[id];
            let tagsHtml = data.tags.map(tag => `<span class="info-tag">${tag}</span>`).join('');
            let optionsHtml = data.options.map(opt => `
                <a href="https://line.me/R/oaMessage/@997pfoig/?สนใจ: ${data.title} - ${opt.name}" class="price-option">
                    <div>
                        <div class="opt-title">${opt.name}</div>
                        <div class="opt-sold">ซื้อไปแล้ว ${opt.sold} ชิ้น</div>
                    </div>
                    <div class="opt-price">${opt.price}฿</div>
                </a>
            `).join('');

            document.getElementById('modalData').innerHTML = `
                <div class="modal-header">
                    <h2>${data.title}</h2>
                    <div>${tagsHtml}</div>
                </div>
                <div class="detail-box">
                    <h4>✨ รายละเอียดสินค้า</h4>
                    <p><b>ความคมชัด:</b> ${data.features.quality}</p>
                    <p><b>จำนวนอุปกรณ์:</b> ${data.features.device}</p>
                    <p><b>การเคลม/ประกัน:</b> ${data.features.warranty}</p>
                    <p><b>ข้อห้าม:</b> ${data.features.rules}</p>
                </div>
                <div class="detail-box" style="background:transparent; padding:0;">
                    <h4>💰 เลือกแพ็กเกจ</h4>
                    ${optionsHtml}
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // ปิด Modal เมื่อคลิกพื้นหลัง
        window.onclick = function(event) {
            if (event.target == document.getElementById('modalOverlay')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
